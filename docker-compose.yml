# ============================================================
# AgAI_31: Docker Compose — Multi-Agent Eval Platform
# Datawebify | evals.datawebify.com
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # BACKEND — FastAPI + LangGraph
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agai31-backend
    ports:
      - "8000:8000"
    environment:
      # LLM
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-gpt-4o}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-claude-sonnet-4-6}
      # Vector Store
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-agai31-policy-kb}
      # Database
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      # Redis
      - REDIS_URL=redis://redis:6379/0
      # App
      - APP_ENV=${APP_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agai31-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./eval_data:/app/eval_data:ro

  # ----------------------------------------------------------
  # FRONTEND — Next.js 14
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agai31-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - agai31-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # REDIS — Human Approval Queue + Task State
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agai31-redis
    ports:
      - "6379:6379"
    networks:
      - agai31-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

# ----------------------------------------------------------
# NETWORKS
# ----------------------------------------------------------
networks:
  agai31-network:
    driver: bridge

# ----------------------------------------------------------
# VOLUMES
# ----------------------------------------------------------
volumes:
  redis_data:
    driver: local